<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常碳足跡計算機</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="back-btn">← 返回綠色生活首頁</a>
    <div class="wrapper">
        <h2>🚗 日常碳足跡計算機</h2>
        <div class="form-group">
            <label>1. 今天搭乘車輛/騎車的公里數：</label>
            <input type="number" id="km" placeholder="例如：15" min="0">
        </div>
        <div class="form-group">
            <label>2. 今天開冷氣的時間 (小時)：</label>
            <input type="number" id="ac-hours" placeholder="例如：5" min="0">
        </div>
        <button onclick="calcCarbon()">計算碳排放量</button>

        <div id="result" class="result-box">
            <div class="num" id="carbon-num">0.0</div>
            <p>公斤 (kg CO2e)</p>
            <div class="status" id="carbon-status"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
