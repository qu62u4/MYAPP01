<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠色生活風格小幫手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="back-home">← 返回主網站首頁</a>

    <header>
        <h1>🌱 綠色生活風格小幫手</h1>
        <p>探索實用的環保互動工具，一起實踐減碳綠生活！</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-content">
                <div class="icon-box icon-carbon">🚗</div>
                <h3>日常碳足跡計算機</h3>
                <p>輸入你的交通與冷氣使用習慣，即時計算出你的每日碳排放量，並給予環保減碳評級。</p>
                <a href="./carbon/index.html" class="btn btn-carbon">開啟應用 ➔</a>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <div class="icon-box icon-water">💧</div>
                <h3>健康飲水與省水日記</h3>
                <p>追蹤每日喝水量與記錄省水好習慣，透過動態進度條幫你達成健康與環保的雙重目標。</p>
                <a href="./water/index.html" class="btn btn-water">開始記錄 ➔</a>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <div class="icon-box icon-sorting">♻️</div>
                <h3>環保資源回收分類挑戰</h3>
                <p>考驗你的環保常識！在限定時間內挑戰將各種垃圾正確分類，好玩又有教育意義。</p>
                <a href="./sorting/index.html" class="btn btn-sorting">開始挑戰 ➔</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 綠色生活風格網頁作業專案</p>
    </footer>
</body>
</html>
